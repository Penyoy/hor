<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0D0D0D">
  <meta name="color-scheme" content="dark">
  <meta name="description" content="Halaman tidak ditemukan - GameHub">
  <meta name="robots" content="noindex, nofollow">

  <title>404 - Halaman Tidak Ditemukan | GameHub</title>

  <!-- Styles -->
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/animation.css">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="assets/icons/favicon.png">

  <style>
    .error-page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: var(--space-lg);
      text-align: center;
    }

    .error-page__code {
      font-size: clamp(6rem, 20vw, 12rem);
      font-weight: 800;
      font-family: var(--font-display);
      line-height: 1;
      margin-bottom: var(--space-md);
      background: linear-gradient(135deg, var(--primary), #6B5CE7);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      opacity: 0.8;
    }

    .error-page__title {
      font-size: 1.5rem;
      font-weight: 600;
      margin-bottom: var(--space-sm);
    }

    .error-page__message {
      font-size: 0.9375rem;
      color: var(--text-secondary);
      margin-bottom: var(--space-xl);
      max-width: 400px;
    }

    .error-page__actions {
      display: flex;
      gap: var(--space-md);
      flex-wrap: wrap;
      justify-content: center;
    }

    .error-page__illustration {
      width: 200px;
      height: 200px;
      margin-bottom: var(--space-xl);
      opacity: 0.5;
    }

    .error-page__illustration svg {
      width: 100%;
      height: 100%;
    }
  </style>
</head>
<body>
  <main class="error-page">
    <div class="error-page__illustration">
      <svg viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="100" cy="100" r="80" stroke="#4F8CFF" stroke-width="2" opacity="0.3"/>
        <circle cx="100" cy="100" r="60" stroke="#4F8CFF" stroke-width="2" opacity="0.2"/>
        <circle cx="100" cy="100" r="40" stroke="#4F8CFF" stroke-width="2" opacity="0.1"/>
        <!-- Face -->
        <circle cx="70" cy="85" r="8" fill="#4F8CFF" opacity="0.6"/>
        <circle cx="130" cy="85" r="8" fill="#4F8CFF" opacity="0.6"/>
        <!-- Mouth -->
        <path d="M70 125 Q100 105 130 125" stroke="#4F8CFF" stroke-width="3" stroke-linecap="round" fill="none" opacity="0.6"/>
        <!-- Game controller -->
        <rect x="60" y="140" width="80" height="40" rx="10" stroke="#4F8CFF" stroke-width="2" fill="none" opacity="0.4"/>
        <circle cx="80" cy="160" r="6" fill="#4F8CFF" opacity="0.3"/>
        <circle cx="120" cy="160" r="6" fill="#4F8CFF" opacity="0.3"/>
        <path d="M75 155 L85 155 M80 150 L80 160" stroke="#4F8CFF" stroke-width="2" opacity="0.3"/>
      </svg>
    </div>

    <h1 class="error-page__code">404</h1>
    <h2 class="error-page__title">Halaman Tidak Ditemukan</h2>
    <p class="error-page__message">
      Sepertinya halaman yang kamu cari tidak ada atau telah dipindahkan. 
      Silakan kembali ke beranda atau cari game lain.
    </p>
    <div class="error-page__actions">
      <a href="index.html" class="btn btn--primary">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        Kembali ke Beranda
      </a>
      <a href="search.html" class="btn btn--secondary">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        Cari Game
      </a>
    </div>
  </main>
</body>
</html>

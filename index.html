  <style>
    :root {

  --card: hsl(48, 96.5%, 88.8%);

  --muted-text: hsl(0, 0%, 63.9%);
  --text: hsl(0, 0%, 89.8%);
}
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}
body {
  background: var(--bg);
  font-family: Verdana;
}
#head img {
  width: 100%;
  position: relative;
  max-height: 400px;
  object-fit: cover;
  object-position: center;
}
#head h1 {
  margin-top: 20px;
  text-align: center;
  text-spacing-trim: 30px;
  color: white;
  font-size: 2rem;
  font-family: Sans-Serif;
}
.card {
  padding: 20px;
  display: block;
  gap: 20px;
}
.card h2 {
  color: var(--text);
}
.card p {
  color: var(--muted-text);
  
}
.card img {
  margin-top: 20px;
  width: 100%;
  height: auto;
  object-position: center;
}
  </style>
</head>

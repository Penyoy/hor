<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0D0D0D">
  <meta name="color-scheme" content="dark">
  <meta name="description" content="GameHub - Platform distribusi game modern dan premium. Temukan dan download game terbaik.">
  <meta name="keywords" content="game, download game, game android, game mobile, game hub">
  <meta name="author" content="GameHub Team">
  <meta name="robots" content="index, follow">

  <!-- Open Graph -->
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://gamehub.vercel.app">
  <meta property="og:title" content="GameHub - Platform Game Modern">
  <meta property="og:description" content="Temukan dan download game terbaik di GameHub.">
  <meta property="og:image" content="https://gamehub.vercel.app/assets/images/og-image.jpg">
  <meta property="og:site_name" content="GameHub">

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:url" content="https://gamehub.vercel.app">
  <meta name="twitter:title" content="GameHub - Platform Game Modern">
  <meta name="twitter:description" content="Temukan dan download game terbaik di GameHub.">
  <meta name="twitter:image" content="https://gamehub.vercel.app/assets/images/og-image.jpg">

  <!-- PWA -->
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="assets/icons/icon-192x192.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="GameHub">

  <title>GameHub - Platform Game Modern</title>

  <!-- Preconnect -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <!-- Styles -->
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/navbar.css">
  <link rel="stylesheet" href="css/home.css">
  <link rel="stylesheet" href="css/detail.css">
  <link rel="stylesheet" href="css/search.css">
  <link rel="stylesheet" href="css/animation.css">
  <link rel="stylesheet" href="css/responsive.css">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="assets/icons/favicon.png">
</head>
<body>
  <!-- Header -->
  <header class="header" id="header">
    <div class="header__inner">
      <a href="index.html" class="header__logo" aria-label="GameHub Home">
        <div class="header__logo-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>
          </svg>
        </div>
        <span class="header__logo-text">Pgames</span>
      </a>

      <div class="header__search">
        <div class="search-bar">
          <svg class="search-bar__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
          </svg>
          <input 
            type="text" 
            class="search-bar__input" 
            id="headerSearchInput"
            placeholder="Cari game..." 
            autocomplete="off"
            aria-label="Cari game"
          >
          <button class="search-bar__clear" id="headerSearchClear" aria-label="Bersihkan pencarian">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg>
          </button>
        </div>
      </div>

      <div class="header__actions">
        <button class="header__btn" id="notificationBtn" aria-label="Notifikasi">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
            <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
          </svg>
          <span class="header__btn-badge"></span>
        </button>
      </div>
    </div>
  </header>

  <!-- Main Content -->
  <main class="page page-enter" id="mainContent">
    <!-- Banner Slider -->
    <div id="bannerContainer"></div>

    <!-- Trending Section -->
    <section class="section section--trending">
      <div class="section__header">
        <h2 class="section__title">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>
          Trending
        </h2>
        <a href="search.html?filter=trending" class="section__link">
          Lihat Semua
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg>
        </a>
      </div>
      <div class="games-grid--horizontal" id="trendingGrid">
        <!-- Skeleton loading -->
      </div>
    </section>

    <!-- Game Terbaru Section -->
    <section class="section">
      <div class="section__header">
        <h2 class="section__title">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/></svg>
          Game Terbaru
        </h2>
        <a href="search.html?filter=new" class="section__link">
          Lihat Semua
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg>
        </a>
      </div>
      <div class="games-grid" id="newGamesGrid">
        <!-- Skeleton loading -->
      </div>
    </section>

    <!-- Editor's Choice Section -->
    <section class="section">
      <div class="section__header">
        <h2 class="section__title">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
          Editor's Choice
        </h2>
        <a href="search.html?filter=editors" class="section__link">
          Lihat Semua
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg>
        </a>
      </div>
      <div class="games-grid" id="editorsChoiceGrid">
        <!-- Skeleton loading -->
      </div>
    </section>

    <!-- Updates Section -->
    <section class="section">
      <div class="section__header">
        <h2 class="section__title">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21.5 2v6h-6M2.5 22v-6h6M2 11.5a10 10 0 0 1 18.8-4.3M22 12.5a10 10 0 0 1-18.8 4.3"/></svg>
          Update Terbaru
        </h2>
        <a href="search.html?filter=updates" class="section__link">
          Lihat Semua
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg>
        </a>
      </div>
      <div class="games-grid" id="updatesGrid">
        <!-- Skeleton loading -->
      </div>
    </section>
  </main>

  <!-- Bottom Navigation -->
  <nav class="bottom-nav" role="navigation" aria-label="Navigasi utama">
    <div class="bottom-nav__inner">
      <a href="index.html" class="bottom-nav__item active" data-page="home" aria-label="Beranda">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        <span>Beranda</span>
        <div class="ripple-container"></div>
      </a>
      <a href="search.html?filter=trending" class="bottom-nav__item" data-page="trending" aria-label="Trending">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>
        <span>Trending</span>
        <div class="ripple-container"></div>
      </a>
      <a href="search.html" class="bottom-nav__item" data-page="search" aria-label="Cari">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <span>Cari</span>
        <div class="ripple-container"></div>
      </a>
      <a href="about.html" class="bottom-nav__item" data-page="about" aria-label="Tentang">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></svg>
        <span>Tentang</span>
        <div class="ripple-container"></div>
      </a>
    </div>
  </nav>

  <!-- Scripts -->
  <script type="module" src="js/app.js"></script>
  <script>
    // Register Service Worker
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('service-worker.js').catch(() => {});
    }
  </script>
</body>
</html>

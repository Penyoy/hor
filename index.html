<!DOCTYPE html>
<html lang="id">
<head>
<link rel="icon" href="logo.jpg">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wanz0__ Profile</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

html,body{
    width:100%;
    min-height:100vh;
    overflow-x:hidden;
}

body{
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(
        135deg,
        #0f172a,
        #1e293b,
        #334155
    );
    padding:20px;
}

/* Background Blur */
body::before,
body::after{
    content:"";
    position:fixed;
    border-radius:50%;
    filter:blur(90px);
    pointer-events:none;
    z-index:-1;
}

body::before{
    width:300px;
    height:300px;
    background:#3b82f6;
    top:-100px;
    left:-100px;
}

body::after{
    width:350px;
    height:350px;
    background:#8b5cf6;
    bottom:-120px;
    right:-120px;
}

/* Card */
.card{
    width:100%;
    max-width:400px;
    padding:30px;

    background:rgba(255,255,255,.08);
    border:1px solid rgba(255,255,255,.15);

    backdrop-filter:blur(20px);
    -webkit-backdrop-filter:blur(20px);

    border-radius:25px;
    text-align:center;

    box-shadow:
    0 8px 32px rgba(0,0,0,.3);

    animation:fadeUp 1s ease;
}

/* Banner */
.banner{
    display:inline-flex;
    align-items:center;
    gap:8px;

    padding:10px 16px;
    margin-bottom:20px;

    background:rgba(255,255,255,.08);
    border:1px solid rgba(255,255,255,.15);

    border-radius:999px;
    color:white;
    font-size:14px;

    animation:slideDown .8s ease;
}

.dot{
    width:8px;
    height:8px;
    border-radius:50%;
    background:#22c55e;
    box-shadow:0 0 10px #22c55e;
}

/* Profile */
.profile{
    width:120px;
    height:120px;
    border-radius:50%;
    object-fit:cover;

    border:3px solid rgba(255,255,255,.3);

    animation:float 4s ease-in-out infinite;
}

h1{
    margin-top:15px;
    color:white;
    font-size:28px;
}

.role{
    color:#cbd5e1;
    margin-top:8px;
    font-size:15px;
}

.desc{
    margin-top:20px;
    color:#e2e8f0;
    line-height:1.7;
    font-size:14px;
}

/* Social */
.social{
    margin-top:25px;
    display:flex;
    justify-content:center;
    gap:10px;
    flex-wrap:wrap;
}

.social a{
    position:relative;
    overflow:hidden;

    text-decoration:none;
    color:white;

    padding:10px 18px;

    background:rgba(255,255,255,.08);
    border:1px solid rgba(255,255,255,.15);

    border-radius:12px;

    transition:.3s;
}

.social a:hover{
    transform:translateY(-4px);
    background:rgba(255,255,255,.15);
}

.social a::before{
    content:"";
    position:absolute;
    top:0;
    left:-100%;
    width:100%;
    height:100%;
    background:rgba(255,255,255,.2);
    transition:.5s;
}

.social a:hover::before{
    left:100%;
}

/* Stats */
.stats{
    display:flex;
    justify-content:space-around;

    margin-top:25px;
    padding-top:20px;

    border-top:1px solid rgba(255,255,255,.1);
}

.stat h3{
    color:white;
}
.pay {
  margin-top:25px;
    display:flex;
    justify-content:center;
    gap:10px;
    flex-wrap:wrap;
}
.pay a {
  position:relative;
    overflow:hidden;

    text-decoration:none;
    color:white;

    padding:10px 18px;

    background:rgba(255,255,255,.08);
    border:1px solid rgba(255,255,255,.15);

    border-radius:12px;

    transition:.3s;
}
.pay a:hover{
    transform:translateY(-4px);
    background:rgba(255,255,255,.15);
}

.pay a::before{
    content:"";
    position:absolute;
    top:0;
    left:-100%;
    width:100%;
    height:100%;
    background:rgba(255,255,255,.2);
    transition:.5s;
}

.pay a:hover::before{
    left:100%;
}
.payme {
  margin-top: 20px;
  width: 200px;
}
.stat p{
    color:#94a3b8;
    font-size:13px;
    margin-top:5px;
}

/* Animations */
@keyframes fadeUp{
    from{
        opacity:0;
        transform:translateY(40px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

@keyframes float{
    0%,100%{
        transform:translateY(0);
    }
    50%{
        transform:translateY(-10px);
    }
}

@keyframes slideDown{
    from{
        opacity:0;
        transform:translateY(-20px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}
</style>
</head>
<body>

<div class="card">

    <div class="banner">
        <span class="dot"></span>
        Online • contact if need something
    </div>

    <img
        src="logo.jpg"
        alt="Profile"
        class="profile"
    >

    <h1>Wanz0__</h1>

    <p class="role">
        Gamer • Uma Musume Creator • Editor
    </p>

    <p class="desc">
        Like posting random content about Uma Musume,
        memes, comics, edits, and other fun stuff.
    </p>

    <div class="social">
        <a href="https://www.instagram.com/wanz0__?igsh=MXR4OHFldXB1MDkzbA==">Instagram</a>
        <a href="">WhatsApp</a>
    </div>

    <img class="payme" src="payme.jpg">
    
    <div class="pay">
      <a href="https://trakteer.id/penyoy/gift">
      <i class="fas fa-coffee"> Trakteer</a>
      </a>
    </div>
    

    <div class="stats">
        <div class="stat">
            <h3>2.187</h3>
            <p>Followers</p>
        </div>

        <div class="stat">
            <h3>170+</h3>
            <p>Posts</p>
        </div>

        <div class="stat">
            <h3>1+</h3>
            <p>Years</p>
        </div>
    </div>

</div>

</body>
</html>
